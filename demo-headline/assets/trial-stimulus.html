<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: transparent; }
  .two-col { display: grid; grid-template-columns: 2fr 3fr; gap: 20px; align-items: start; padding: 4px; }
  .headline-col { padding-top: 4px; }
  .headline-title { font-size: 19px; font-weight: 500; line-height: 1.35; color: #1a1a1a; margin-bottom: 10px; }
  .headline-lede { font-size: 14px; font-weight: 400; line-height: 1.55; color: #5f6368; }
  .chart-col img { width: 100%; height: auto; display: block; }
  .chart-only { display: flex; justify-content: center; padding: 4px; }
  .chart-only img { max-width: 720px; width: 100%; height: auto; display: block; }
</style>
</head>
<body>
<div id="root"></div>
<script>
  var params = new URLSearchParams(window.location.search);
  var chartFile = params.get('c') || '';
  var headline = params.get('h') || '';
  var lede = params.get('l') || '';
  var root = document.getElementById('root');

  var imgSrc = 'plots/' + chartFile;

  if (headline) {
    root.innerHTML =
      '<div class="two-col">' +
        '<div class="headline-col">' +
          '<div class="headline-title">' + decodeURIComponent(headline) + '</div>' +
          '<div class="headline-lede">' + decodeURIComponent(lede) + '</div>' +
        '</div>' +
        '<div class="chart-col">' +
          '<img id="ci" src="' + imgSrc + '" alt="Chart" />' +
        '</div>' +
      '</div>';
  } else {
    root.innerHTML =
      '<div class="chart-only">' +
        '<img id="ci" src="' + imgSrc + '" alt="Chart" />' +
      '</div>';
  }

  var img = document.getElementById('ci');
  if (img) {
    img.onerror = function() {
      if (this.dataset.r) return;
      this.dataset.r = '1';
      this.src = '/demo-headline/assets/plots/' + chartFile;
    };
  }
</script>
</body>
</html>
