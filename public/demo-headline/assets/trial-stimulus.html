<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: transparent; }
  .two-col { display: grid; grid-template-columns: 2fr 3fr; gap: 20px; align-items: center; padding: 8px 4px; min-height: 380px; }
  .headline-col { display: flex; flex-direction: column; justify-content: center; padding: 0 12px; }
  .headline-title { font-size: 24px; font-weight: 600; line-height: 1.3; color: #1a1a1a; margin-bottom: 14px; }
  .headline-lede { font-size: 15px; font-weight: 400; line-height: 1.6; color: #5f6368; }
  .chart-col img { width: 100%; height: auto; display: block; }
  .chart-only { display: flex; justify-content: center; align-items: center; padding: 8px 4px; }
  .chart-only img { max-width: 100%; width: 100%; height: auto; display: block; }
</style>
</head>
<body>
<div id="root"></div>
<script>
  var params = new URLSearchParams(window.location.search);
  var chartFile = params.get('c') || '';
  var headline = decodeURIComponent(params.get('h') || '');
  var lede = decodeURIComponent(params.get('l') || '');
  var root = document.getElementById('root');
  var imgSrc = 'plots/' + chartFile;

  if (headline) {
    root.innerHTML =
      '<div class="two-col">' +
        '<div class="headline-col">' +
          '<div class="headline-title">' + headline + '</div>' +
          '<div class="headline-lede">' + lede + '</div>' +
        '</div>' +
        '<div class="chart-col">' +
          '<img id="ci" src="' + imgSrc + '" alt="Chart" />' +
        '</div>' +
      '</div>';
  } else {
    root.innerHTML =
      '<div class="chart-only">' +
        '<img id="ci" src="' + imgSrc + '" alt="Chart" />' +
      '</div>';
  }

  var img = document.getElementById('ci');
  if (img) {
    img.onerror = function() {
      if (this.dataset.r) return;
      this.dataset.r = '1';
      this.src = '/demo-headline/assets/plots/' + chartFile;
    };
  }
</script>
</body>
</html>
